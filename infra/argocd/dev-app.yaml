apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pricing-platform-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: pricing-platform
  source:
    repoURL: https://github.com/snishok/pricing-platform.git
    targetRevision: main
    path: infra/k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: pricing-platform-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

