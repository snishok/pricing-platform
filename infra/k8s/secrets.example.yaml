apiVersion: v1
kind: Secret
metadata:
  name: pricing-secrets
  namespace: pricing-platform
type: Opaque
stringData:
  POSTGRES_USER: pricing_user
  POSTGRES_PASSWORD: pricing_pass
  DATABASE_URL: postgresql+asyncpg://pricing_user:pricing_pass@postgres:5432/pricing
  JWT_SECRET_KEY: change_me_in_prod
  TYPESENSE_API_KEY: typesense_api_key
  SEED_ADMIN_EMAIL: admin@example.com
  SEED_ADMIN_PASSWORD: change_me_please
  SEED_VIEWER_EMAIL: viewer@example.com
  SEED_VIEWER_PASSWORD: change_me_please
  SEED_EDITOR_EMAIL: editor@example.com
  SEED_EDITOR_PASSWORD: change_me_please
  SEED_UPLOADER_EMAIL: uploader@example.com
  SEED_UPLOADER_PASSWORD: change_me_please

# NOTE:
# - This file is for local/dev convenience only.
# - Do NOT apply this in staging/prod.
# - GitOps deployment is driven via Kustomize overlays under `infra/k8s/overlays/*`,
#   and secrets should be managed via External Secrets / Sealed Secrets.

