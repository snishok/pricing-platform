apiVersion: batch/v1
kind: CronJob
metadata:
  name: pricing-retention
  namespace: pricing-platform
spec:
  schedule: "20 2 * * *" # daily 02:20
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: retention
              image: pricing-platform-backend:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "app.jobs.retention"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: pricing-platform-secrets
                      key: database_url
                - name: TYPESENSE_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: pricing-platform-secrets
                      key: typesense_api_key
                - name: JWT_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: pricing-platform-secrets
                      key: jwt_secret_key
                - name: PRICING_RETENTION_DAYS
                  value: "730"

