apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: pricing-platform
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pricing-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: your-dockerhub-user/pricing-frontend:latest
          ports:
            - containerPort: 80
              name: http

