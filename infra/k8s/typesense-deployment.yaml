apiVersion: v1
kind: Service
metadata:
  name: typesense
  namespace: pricing-platform
spec:
  ports:
    - port: 8108
      name: http
  selector:
    app: typesense
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: typesense
  namespace: pricing-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: typesense
  template:
    metadata:
      labels:
        app: typesense
    spec:
      containers:
        - name: typesense
          image: typesense/typesense:30.2
          args:
            - --data-dir=/data
            - --api-key=$(TYPESENSE_API_KEY)
            - --enable-cors
          env:
            - name: TYPESENSE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pricing-secrets
                  key: TYPESENSE_API_KEY
          ports:
            - containerPort: 8108
              name: http
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: typesense-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: typesense-pvc
  namespace: pricing-platform
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi

