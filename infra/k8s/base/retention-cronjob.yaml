apiVersion: batch/v1
kind: CronJob
metadata:
  name: pricing-retention
spec:
  schedule: "20 2 * * *" # daily 02:20
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: retention
              image: your-dockerhub-user/pricing-backend:0.1.0
              imagePullPolicy: Always
              command: ["python", "-m", "app.jobs.retention"]
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 10001
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: pricing-secrets
                      key: DATABASE_URL
                - name: TYPESENSE_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: pricing-secrets
                      key: TYPESENSE_API_KEY
                - name: JWT_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: pricing-secrets
                      key: JWT_SECRET_KEY
                - name: PRICING_RETENTION_DAYS
                  value: "730"

