apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: pricing-platform
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: pricing-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: your-dockerhub-user/pricing-backend:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pricing-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: pricing-secrets
                  key: JWT_SECRET_KEY
            - name: TYPESENSE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pricing-secrets
                  key: TYPESENSE_API_KEY
            - name: TYPESENSE_HOST
              value: typesense
            - name: TYPESENSE_PORT
              value: "8108"
            - name: TYPESENSE_PROTOCOL
              value: http
            - name: SEED_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: pricing-secrets
                  key: SEED_ADMIN_EMAIL
            - name: SEED_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pricing-secrets
                  key: SEED_ADMIN_PASSWORD
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

