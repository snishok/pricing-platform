name: Build & Publish Images

on:
  workflow_run:
    workflows: ["Build & Test"]
    types: [completed]
    branches:
      # Matches the head branch of the triggering run.
      - main
      - master

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  build_backend:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      backend_image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push backend image
        id: meta
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/pricing-backend:${{ github.event.workflow_run.head_sha }}"
          docker build -t "$IMAGE" backend
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  build_frontend:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      frontend_image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push frontend image
        id: meta
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/pricing-frontend:${{ github.event.workflow_run.head_sha }}"
          docker build -t "$IMAGE" frontend/packages/app
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  update_dev_overlay:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    needs: [build_backend, build_frontend]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Overlay updates should be based on current main branch state.
          persist-credentials: false
      - name: Update dev overlay image tags
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, re
          path = os.environ["DEV_KUSTOM"]
          sha = os.environ["SOURCE_SHA"]
          dockerhub = os.environ["DOCKERHUB_USERNAME"]
          s = open(path, "r", encoding="utf-8").read()
          # Update both newName (registry path) and newTag (immutable SHA)
          s = re.sub(
              r"(name:\s*your-dockerhub-user/pricing-backend\s*(?:\n|\r\n)\s*newName:)\s*.*",
              r"\1 " + f"{dockerhub}/pricing-backend",
              s,
          )
          s = re.sub(
              r"(name:\s*your-dockerhub-user/pricing-backend\s*(?:\n|\r\n)\s*newName:\s*[^\n]+\s*(?:\n|\r\n)\s*newTag:)\s*.*",
              r"\1 " + sha,
              s,
          )
          s = re.sub(
              r"(name:\s*your-dockerhub-user/pricing-frontend\s*(?:\n|\r\n)\s*newName:)\s*.*",
              r"\1 " + f"{dockerhub}/pricing-frontend",
              s,
          )
          s = re.sub(
              r"(name:\s*your-dockerhub-user/pricing-frontend\s*(?:\n|\r\n)\s*newName:\s*[^\n]+\s*(?:\n|\r\n)\s*newTag:)\s*.*",
              r"\1 " + sha,
              s,
          )
          open(path, "w", encoding="utf-8").write(s)
          PY
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DEV_KUSTOM: infra/k8s/overlays/dev/kustomization.yaml
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
      - name: Create PR for dev deployment
        uses: peter-evans/create-pull-request@v7
        with:
          branch: deploy/dev-${{ github.event.workflow_run.head_sha }}
          base: main
          delete-branch: true
          title: "deploy(dev): ${{ github.event.workflow_run.head_sha }}"
          body: |
            Updates `infra/k8s/overlays/dev` to deploy images built from `${{ github.event.workflow_run.head_sha }}`.
          commit-message: "deploy(dev): bump images to ${{ github.event.workflow_run.head_sha }}"

