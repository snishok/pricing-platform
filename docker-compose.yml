services:
  nginx:
    build:
      context: ./infra/docker/nginx
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: packages/app/Dockerfile
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pricing
      POSTGRES_USER: pricing_user
      POSTGRES_PASSWORD: pricing_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricing_user -d pricing"]
      interval: 5s
      timeout: 5s
      retries: 30

  typesense:
    image: typesense/typesense:30.2
    command: ["--data-dir", "/data", "--api-key", "${TYPESENSE_API_KEY:-typesense_api_key}", "--enable-cors"]
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: ./backend
    environment:
      ENVIRONMENT: dev
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}
      DATABASE_URL: postgresql+asyncpg://pricing_user:pricing_pass@postgres:5432/pricing
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_me_in_prod}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRES_MINUTES: 60
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-change_me_please}
      SEED_VIEWER_EMAIL: ${SEED_VIEWER_EMAIL:-viewer@example.com}
      SEED_VIEWER_PASSWORD: ${SEED_VIEWER_PASSWORD:-change_me_please}
      SEED_EDITOR_EMAIL: ${SEED_EDITOR_EMAIL:-editor@example.com}
      SEED_EDITOR_PASSWORD: ${SEED_EDITOR_PASSWORD:-change_me_please}
      SEED_UPLOADER_EMAIL: ${SEED_UPLOADER_EMAIL:-uploader@example.com}
      SEED_UPLOADER_PASSWORD: ${SEED_UPLOADER_PASSWORD:-change_me_please}
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-typesense_api_key}
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: 8108
      TYPESENSE_PROTOCOL: http
      TYPESENSE_COLLECTION: pricing
      TYPESENSE_MAX_CONCURRENCY: ${TYPESENSE_MAX_CONCURRENCY:-16}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-600/minute}
      RATE_LIMIT_STORAGE_URI: ${RATE_LIMIT_STORAGE_URI:-redis://redis:6379/0}
      SEARCH_CACHE_TTL_SECONDS: ${SEARCH_CACHE_TTL_SECONDS:-15}
      SEARCH_CACHE_MAX_ENTRIES: ${SEARCH_CACHE_MAX_ENTRIES:-512}
      SEARCH_CACHE_REDIS_URL: ${SEARCH_CACHE_REDIS_URL:-redis://redis:6379/1}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-52428800}
      CORS_ORIGINS: '["http://localhost:8080","http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      typesense:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  tailscale:
    image: tailscale/tailscale:stable
    profiles: ["tailscale"]
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_HOSTNAME: ${TS_HOSTNAME:-pricing-platform}
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:-}
      TS_STATE_DIR: /var/lib/tailscale
    volumes:
      - tailscale_state:/var/lib/tailscale
      - ./infra/docker/tailscale/entrypoint.sh:/entrypoint.sh:ro
    command: ["sh", "/entrypoint.sh"]
    cap_add:
      - NET_ADMIN
      - NET_RAW

volumes:
  postgres_data:
  typesense_data:
  tailscale_state:

